<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التحقق بنجاح - Snapchat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .success-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 45px;
            color: white;
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
            animation: checkAnimation 0.8s ease-out 0.3s both;
        }
        
        @keyframes checkAnimation {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .success-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 28px;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }
        
        .success-message {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .continue-btn {
            background: #FFFC00;
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-size: 16px;
            animation: fadeIn 0.8s ease-out 0.9s both;
        }
        
        .continue-btn:hover {
            background: #e6e300;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 252, 0, 0.4);
            color: #333;
            text-decoration: none;
        }
        
        .security-note {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 14px;
            animation: fadeIn 0.8s ease-out 1.1s both;
        }
        
        .security-icon-small {
            color: #28a745;
            margin-left: 5px;
        }
        
        @media (max-width: 480px) {
            .success-container {
                padding: 40px 30px;
                margin: 10px;
            }
            
            .success-title {
                font-size: 24px;
            }
            
            .success-message {
                font-size: 14px;
            }
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FFFC00;
            animation: confetti-fall 3s linear infinite;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h2 class="success-title">تم التحقق بنجاح!</h2>
        
        <p class="success-message">
            تهانينا! تم التحقق من هويتك بنجاح. يمكنك الآن الوصول إلى حسابك بأمان.
        </p>
        
        <a href="/" class="continue-btn">
            العودة إلى الصفحة الرئيسية
        </a>
        
        <div class="security-note">
            <i class="fas fa-shield-alt security-icon-small"></i>
            حسابك محمي بنظام الأمان المتطور لدينا
        </div>
    </div>
