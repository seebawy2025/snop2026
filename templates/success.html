<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جارٍ التوجيه... - Snapchat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f7f7f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 48px 36px 40px;
            text-align: center;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .snap-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            display: block;
            animation: popIn 0.6s ease 0.2s both;
        }

        @keyframes popIn {
            0%  { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100%{ transform: scale(1); opacity: 1; }
        }

        .check-circle {
            width: 72px;
            height: 72px;
            background: #FFFC00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: popIn 0.6s ease 0.1s both;
        }

        .check-circle svg {
            width: 36px;
            height: 36px;
            color: #16191c;
        }

        .success-title {
            font-size: 22px;
            font-weight: 700;
            color: #16191c;
            margin-bottom: 10px;
        }

        .success-msg {
            font-size: 14px;
            color: #707070;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .open-snap-btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: #FFFC00;
            color: #16191c;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.15s ease;
            animation: fadeUp 0.5s ease 0.5s both;
        }

        .open-snap-btn:hover {
            background: #e6e300;
            transform: translateY(-1px);
            color: #16191c;
        }

        .home-link {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #a0a0a0;
            text-decoration: none;
            animation: fadeUp 0.5s ease 0.6s both;
        }

        .home-link:hover {
            color: #555;
        }

        footer {
            text-align: center;
            padding: 16px;
            background: #16191c;
        }

        footer a {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="success-card">
            <div class="check-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>

            <h1 class="success-title">تم التحقق بنجاح!</h1>
            <p class="success-msg">
                جاري فتح حسابك الآن...
                <br>سيتم توجيهك تلقائياً خلال ثوانٍ.
            </p>

            <a href="snapchat://add/maymona19" class="open-snap-btn" id="openBtn">
                📸 فتح Snapchat
            </a>

            <a href="/" class="home-link">العودة إلى البداية</a>
        </div>
    </div>

    <footer>
        <a href="#">سياسة الخصوصية</a>
        <a href="#">شروط الخدمة</a>
        <a href="#">المساعدة</a>
    </footer>

    <script>
        // Auto redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'snapchat://add/maymona19';
        }, 3000);
    </script>
</body>
</html>
